<line x1="10" y1="28" x2="26" y2="28" stroke="url(#ac)" stroke-width="1.7" opacity="0.3"/>
<line x1="10" y1="34" x2="22" y2="34" stroke="url(#ac)" stroke-width="1.7" opacity="0.22"/>
<!-- big check mark badge -->
<circle cx="36" cy="32" r="10" stroke="#059669" stroke-width="2.5" fill="#0a0a12" fill-opacity=".9" filter="url(#s3d_accept_c)"/>
<path d="M30 32l4 4 8-8" stroke="#059669" stroke-width="3.2" fill="none"/>
