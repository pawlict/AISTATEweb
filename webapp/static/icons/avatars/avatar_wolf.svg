<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">

<defs><radialGradient id="awf" cx="50%" cy="45%"><stop offset="0%" stop-color="#1f2937"/><stop offset="100%" stop-color="#0a0e14"/></radialGradient></defs>
<circle cx="24" cy="24" r="23" fill="url(#awf)" stroke="#64748b" stroke-width="1.5"/>
<!-- ears (tall, pointed) -->
<path d="M10 8l5 12-7 2z" stroke="#d1d5db" stroke-width=".8" fill="#d1d5db" fill-opacity="0.29" opacity="0.95"/>
<path d="M38 8l-5 12 7 2z" stroke="#d1d5db" stroke-width=".8" fill="#d1d5db" fill-opacity="0.29" opacity="0.95"/>
<!-- head shape (wider, angular) -->
<path d="M8 22c0-4 4-8 8-10h16c4 2 8 6 8 10v4c0 6-6 12-16 14-10-2-16-8-16-14z" stroke="#ffffff" stroke-width=".8" fill="none" opacity="0.78"/>
<!-- brow (menacing) -->
<path d="M12 20l8-2" stroke="#d1d5db" stroke-width="1.2" opacity="0.95"/>
<path d="M36 20l-8-2" stroke="#d1d5db" stroke-width="1.2" opacity="0.95"/>
<!-- eyes (fierce, glowing) -->
<path d="M16 22l4 1" stroke="#d8ffff" stroke-width="1.5" opacity="0.95"/>
<path d="M32 22l-4 1" stroke="#d8ffff" stroke-width="1.5" opacity="0.95"/>
<circle cx="18" cy="22" r="2" fill="#d8ffff" opacity="0.95"/>
<circle cx="30" cy="22" r="2" fill="#d8ffff" opacity="0.95"/>
<circle cx="18" cy="22" r=".8" fill="#ffffff" opacity="0.95"/>
<circle cx="30" cy="22" r=".8" fill="#ffffff" opacity="0.95"/>
<!-- snout -->
<path d="M18 26c2 4 4 6 6 6s4-2 6-6" stroke="#ffffff" stroke-width=".8" fill="none" opacity="0.95"/>
<!-- nose -->
<ellipse cx="24" cy="28" rx="3" ry="2" fill="#ffffff" opacity="0.69"/>
<!-- snarl / fangs -->
<path d="M18 30l2 3M30 30l-2 3" stroke="#d1d5db" stroke-width=".8" opacity="0.95"/>
<path d="M16 30c3 2 6 3 8 3s5-1 8-3" stroke="#ffffff" stroke-width=".7" fill="none" opacity="0.78"/>
<!-- fur texture on cheeks -->
<path d="M10 24c2 1 3 3 3 5" stroke="#e1ffff" stroke-width=".5" fill="none" opacity="0.49"/>
<path d="M38 24c-2 1-3 3-3 5" stroke="#e1ffff" stroke-width=".5" fill="none" opacity="0.49"/>

</svg>