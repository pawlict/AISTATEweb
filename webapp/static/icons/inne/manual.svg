<line x1="10" y1="19" x2="18" y2="19" stroke="url(#mn)" stroke-width="1.2" opacity="0.38"/>
<line x1="10" y1="24" x2="20" y2="24" stroke="url(#mn)" stroke-width="1.2" opacity="0.3"/>
<line x1="10" y1="29" x2="16" y2="29" stroke="url(#mn)" stroke-width="1.2" opacity="0.22"/>
<!-- diagram/icon on right page (gear = how-to) -->
