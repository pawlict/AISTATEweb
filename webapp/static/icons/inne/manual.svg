<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" stroke-linecap="round" stroke-linejoin="round">
<defs><linearGradient id="mn" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#05657c"/><stop offset="100%" stop-color="#5628a5"/></linearGradient><filter id="s3d_manual"><feDropShadow dx="1.5" dy="2.5" stdDeviation="2" flood-opacity=".3"/></filter></defs>
<path d="M4 44 Q14 41 24 43 Q34 45 44 42" stroke="#05657c" stroke-width="1" fill="none" opacity="0.22"/>
