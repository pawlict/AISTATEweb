<line x1="39" y1="18" x2="40" y2="18" stroke="#5628a5" stroke-width="1.2" opacity=".35"/>
<!-- text lines right page below diagram -->
<line x1="28" y1="27" x2="38" y2="27" stroke="url(#mn)" stroke-width="1.2" opacity="0.38"/>
<line x1="28" y1="32" x2="36" y2="32" stroke="url(#mn)" stroke-width="1.2" opacity="0.3"/>
