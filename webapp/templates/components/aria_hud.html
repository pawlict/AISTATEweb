{# A.R.I.A. HUD — Analytical Response & Intelligence Assistant overlay #}

<link rel="stylesheet" href="/static/aria_hud.css?v={{ app_version }}&_={{ static_ts }}"/>

<!-- Trigger button (hexagonal) -->
<button id="aria-trigger" title="A.R.I.A. — Asystent analityczny">
  <div class="trigger-pulse"></div>
  <svg id="aria-hex-svg" viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg">
    <polygon class="hex-bg" points="28,2 52,15 52,41 28,54 4,41 4,15"/>
    <g id="aria-logo-group">
      <text class="aria-label-ai" x="28" y="24">AI</text>
      <text class="aria-label-name" x="28" y="36">ARIA</text>
    </g>
    <g id="aria-wave-group" style="display:none">
      <rect class="wbar" x="10" y="18" width="2.5" height="20" rx="1"/>
      <rect class="wbar" x="15" y="18" width="2.5" height="20" rx="1"/>
      <rect class="wbar" x="20" y="18" width="2.5" height="20" rx="1"/>
      <rect class="wbar" x="25" y="18" width="2.5" height="20" rx="1"/>
      <rect class="wbar" x="30" y="18" width="2.5" height="20" rx="1"/>
      <rect class="wbar" x="35" y="18" width="2.5" height="20" rx="1"/>
      <rect class="wbar" x="40" y="18" width="2.5" height="20" rx="1"/>
    </g>
  </svg>
</button>

<!-- HUD Panel -->
<div id="aria-hud" class="hidden">
  <!-- Corner brackets -->
  <div class="aria-corner tl"></div>
  <div class="aria-corner tr"></div>
  <div class="aria-corner bl"></div>
  <div class="aria-corner br"></div>

  <!-- Header -->
  <div class="aria-header">
    <div id="aria-status-dot" class="aria-status-dot"></div>
    <div class="aria-header-title">A.R.I.A.</div>
    <button id="aria-close" class="aria-close-btn" title="Zamknij">&times;</button>
  </div>

  <!-- Status line -->
  <div class="aria-statusline">
    <span id="aria-st-ses">SES:—</span>
    <span id="aria-st-msg">MSG:0</span>
    <span id="aria-st-model">MDL:—</span>
    <span id="aria-st-state">INIT</span>
  </div>

  <!-- Messages -->
  <div id="aria-messages" class="aria-messages"></div>

  <!-- Hint chips -->
  <div id="aria-hints" class="aria-hints"></div>

  <!-- Input row -->
  <div class="aria-inputrow">
    <span class="aria-input-prefix">OP&gt;</span>
    <textarea id="aria-input" class="aria-input" rows="1" placeholder="Zapytaj ARIA..."></textarea>
    <button id="aria-send" class="aria-send-btn" title="Wyślij">&#9654;</button>
    <button id="aria-tts-toggle" class="aria-tts-btn active" title="TTS aktywny">&#128266;</button>
  </div>
</div>

<script src="/static/aria_hud.js?v={{ app_version }}&_={{ static_ts }}"></script>
