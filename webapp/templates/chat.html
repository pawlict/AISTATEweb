{% extends "base.html" %}
{% block content %}

<div class="chat-page">

  <div class="card chat-toolbar">
    <div class="chat-toolbar-left">
      <div class="h1" style="margin:0"><i data-icon="chat" data-size="40"></i> <span data-i18n="chat.title">Chat LLM</span></div>
    </div>
    <div class="chat-toolbar-right">
      <label class="small" for="chat_model" data-i18n="chat.model">Model</label>
      <select class="input mini-select" id="chat_model" style="width:auto;min-width:180px">
        <option data-i18n="chat.models_loading">Ładowanie…</option>
      </select>
      <button class="btn secondary" id="chat_new_btn" title="Nowa rozmowa" data-i18n-title="chat.new_conversation">
        <span data-i18n="chat.new">Nowa rozmowa</span>
      </button>
    </div>
  </div>

  <div class="analyst-panel-layout chat-container">
    <!-- Analyst panel (collapsible left sidebar) -->
    <aside class="analyst-panel collapsed" id="chat_analyst_panel">
      <button class="analyst-panel-toggle" id="chat_panel_toggle" title="Panel analityczny">
        <img src="/static/icons/akcje/sidebar_expand.svg" alt="" width="18" height="18" draggable="false">
      </button>
      <div class="analyst-panel-body">
        <div class="analyst-panel-header">
          <div class="h2" style="margin:0;font-size:15px;display:flex;align-items:center;gap:6px">
            <img src="/static/icons/dokumenty/notes.svg" alt="" width="16" height="16" draggable="false">
            <span data-i18n="analyst_panel.title">Panel analityczny</span>
          </div>
          <button class="analyst-panel-toggle-inner" id="chat_panel_collapse" title="Zwiń panel">
            <img src="/static/icons/akcje/sidebar_collapse.svg" alt="" width="16" height="16" draggable="false">
          </button>
        </div>
        <div class="analyst-panel-divider"></div>

        <!-- SYSTEM PROMPT -->
        <div class="analyst-panel-section">
          <div class="nav-section analyst-panel-section-toggle" data-i18n="chat.system_prompt">Prompt systemowy</div>
          <div class="analyst-panel-section-content">
            <textarea class="input" id="chat_system_prompt" rows="4" placeholder="Opcjonalnie: określ rolę asystenta…" data-i18n-placeholder="chat.system_prompt_placeholder" style="width:100%;min-height:80px;max-height:200px;resize:vertical;"></textarea>
          </div>
        </div>
        <div class="analyst-panel-divider"></div>

        <!-- TEMPERATURE -->
        <div class="analyst-panel-section">
          <div class="nav-section analyst-panel-section-toggle" data-i18n="chat.temperature">Temperatura</div>
          <div class="analyst-panel-section-content">
            <div style="display:flex;align-items:center;gap:8px">
              <input type="range" id="chat_temperature" min="0" max="1.5" step="0.1" value="0.7" style="flex:1">
              <span class="small" id="chat_temp_val">0.7</span>
            </div>
          </div>
        </div>
        <div class="analyst-panel-divider"></div>

        <!-- HISTORY -->
        <div class="analyst-panel-section" style="flex:1;display:flex;flex-direction:column;min-height:0;">
          <div class="nav-section analyst-panel-section-toggle" data-i18n="chat.history">Historia</div>
          <div class="analyst-panel-section-content" style="flex:1;overflow-y:auto;min-height:0;">
            <div id="chat_history_list" class="chat-history-list">
              <div class="small" data-i18n="chat.no_conversations">Brak rozmów</div>
            </div>
          </div>
        </div>

      </div>
    </aside>

    <!-- Main chat area -->
    <div class="analyst-panel-main chat-main">
      <div class="card chat-messages-card">
        <div class="chat-messages" id="chat_messages">
          <div class="chat-welcome" id="chat_welcome">
            <div class="chat-welcome-icon"><i data-icon="robot" data-size="32"></i></div>
            <div class="h2" data-i18n="chat.welcome_title">Rozpocznij rozmowę</div>
            <div class="small" data-i18n="chat.welcome_desc">Wybierz model i napisz wiadomość, aby rozpocząć czat z lokalnym LLM.</div>
          </div>
        </div>
      </div>

      <div class="card chat-input-card" id="chat_input_card">
        <div class="chat-attach-preview" id="chat_attach_preview" style="display:none"></div>
        <div class="chat-input-row">
          <button class="btn secondary chat-attach-btn" id="chat_attach_btn"
                  title="Załącz plik" data-i18n-title="chat.attach_file">
            <svg viewBox="0 0 24 24" width="20" height="20" style="vertical-align:middle">
              <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"
                    stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <input type="file" id="chat_file_input" multiple style="display:none"
                 accept=".txt,.md,.pdf,.docx,.xlsx,.pptx,.csv,.json,.xml,.png,.jpg,.jpeg,.gif,.webp">
          <textarea class="input chat-input" id="chat_input" rows="6"
                    placeholder="Napisz wiadomość…"
                    data-i18n-placeholder="chat.input_placeholder"></textarea>
          <button class="btn chat-send-btn" id="chat_send_btn" data-i18n-title="chat.send">
            <svg viewBox="0 0 24 24" width="20" height="20" style="vertical-align:middle">
              <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" fill="none"/>
              <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" fill="none"/>
            </svg>
          </button>
          <button class="btn secondary chat-stop-btn" id="chat_stop_btn" style="display:none" data-i18n-title="chat.stop">
            <span data-i18n="chat.stop">Stop</span>
          </button>
        </div>
      </div>
    </div>
  </div>

</div>

{% endblock %}

{% block scripts %}
<script src="/static/chat.js?v={{ app_version }}&_={{ static_ts }}"></script>
<script>
  (async () => {
    await initChat();
    applyI18n();
  })();

  // Analyst Panel Toggle
  (function() {
    var panel = document.getElementById("chat_analyst_panel");
    var toggleBtn = document.getElementById("chat_panel_toggle");
    var collapseBtn = document.getElementById("chat_panel_collapse");
    if (!panel) return;
    var lsKey = "aistate_analyst_panel_chat";
    if (localStorage.getItem(lsKey) === "open") panel.classList.remove("collapsed");
    if (toggleBtn) toggleBtn.addEventListener("click", function() {
      panel.classList.remove("collapsed");
      localStorage.setItem(lsKey, "open");
    });
    if (collapseBtn) collapseBtn.addEventListener("click", function() {
      panel.classList.add("collapsed");
      localStorage.setItem(lsKey, "collapsed");
    });
    // Section toggles (click to collapse/expand)
    document.querySelectorAll('#chat_analyst_panel .analyst-panel-section-toggle').forEach(function(label) {
      var content = label.nextElementSibling;
      if (!content || !content.classList.contains('analyst-panel-section-content')) return;
      var key = 'aistate_chat_sec_' + (label.getAttribute('data-i18n') || label.textContent.trim());
      if (localStorage.getItem(key) === '1') {
        content.style.display = 'none';
        label.classList.add('nav-section-collapsed');
      }
      label.addEventListener('click', function() {
        var hidden = content.style.display === 'none';
        content.style.display = hidden ? '' : 'none';
        label.classList.toggle('nav-section-collapsed', !hidden);
        localStorage.setItem(key, hidden ? '0' : '1');
      });
    });
  })();
</script>
{% endblock %}
