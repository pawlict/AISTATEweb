{% extends "base.html" %}
{% block content %}
<div class="card" style="padding:1.5rem;">
  <h2 style="margin-top:0;">Zarządzanie ustawieniami <span class="en">Settings management</span></h2>
  <p style="color:var(--muted,#888);font-size:.85rem;">
    Zarządzaj użytkownikami, bezpieczeństwem, systemem i licencją.
    <br><span class="en">Manage users, security, system and license.</span>
  </p>

  <!-- Tabs -->
  <div class="users-tabs" style="display:flex;gap:.3rem;margin:1rem 0 .8rem;border-bottom:2px solid var(--border,#e0e3e8);padding-bottom:0;">
    <button class="users-tab active" data-panel="usersPanel">
      Użytkownicy <span class="en">Users</span>
    </button>
    <button class="users-tab" data-panel="securityPanel">
      Bezpieczeństwo <span class="en">Security</span>
    </button>
    {% if user and user.is_superadmin %}
    <button class="users-tab" data-panel="projectsPanel">
      Projekty <span class="en">Projects</span>
    </button>
    <button class="users-tab" data-panel="systemPanel">
      System <span class="en">System</span>
    </button>
    <button class="users-tab" data-panel="licensePanel">
      Licencja <span class="en">License</span>
    </button>
    {% endif %}
  </div>
