# ============================================================
# RISK DICTIONARY (additional patterns for risk tagging)
# ============================================================
risk_dictionary:
  structuring:
    - "przelew.*9\\s*[89]\\d{2}"
    - "wpl?ata.*9\\s*[89]\\d{2}"
  money_mule:
    - "przelew.*dalej"
    - "forward.*transfer"

