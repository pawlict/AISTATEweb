<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>PDF Inspector — ING Statement</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#1a1a2e;color:#e0e0e0;padding:20px}
h1{font-size:1.4rem;margin-bottom:12px;color:#00d4ff}
.drop{border:2px dashed #444;border-radius:12px;padding:40px;text-align:center;cursor:pointer;transition:.2s;margin-bottom:16px}
.drop:hover,.drop.over{border-color:#00d4ff;background:rgba(0,212,255,.05)}
.drop input{display:none}
#status{margin:8px 0;font-size:.85rem;color:#aaa}
#output{background:#111;border:1px solid #333;border-radius:8px;padding:12px;font-family:'Courier New',monospace;font-size:.72rem;white-space:pre-wrap;max-height:70vh;overflow:auto;line-height:1.4}
button{background:#00d4ff;color:#000;border:none;padding:8px 20px;border-radius:6px;cursor:pointer;font-weight:700;margin-top:8px}
button:hover{background:#00b8d9}
.section{color:#00d4ff;font-weight:bold;margin:8px 0 4px}
</style>
</head>
<body>
<h1>PDF Inspector — wrzuć wyciąg ING</h1>
<div class="drop" id="drop">
  <p>Kliknij lub przeciągnij PDF tutaj</p>
  <input type="file" id="file" accept=".pdf">
</div>
<div id="status"></div>
<button onclick="copyResult()" style="display:none" id="copyBtn">Kopiuj wynik do schowka</button>
<pre id="output"></pre>

<script>
const drop = document.getElementById('drop');
const fileInput = document.getElementById('file');
const status = document.getElementById('status');
const output = document.getElementById('output');
const copyBtn = document.getElementById('copyBtn');

pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

drop.addEventListener('click', () => fileInput.click());
drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('over'); });
drop.addEventListener('dragleave', () => drop.classList.remove('over'));
drop.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('over'); handleFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

async function handleFile(file) {
  if (!file) return;
  status.textContent = 'Ładowanie PDF: ' + file.name + ' (' + (file.size/1024).toFixed(0) + ' KB)...';
  output.textContent = '';

  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data: buf}).promise;
  const totalPages = pdf.numPages;

  let result = '=== PDF: ' + file.name + ' ===\n';
  result += '=== Stron: ' + totalPages + ' ===\n\n';

  for (let p = 1; p <= totalPages; p++) {
    const page = await pdf.getPage(p);
    const textContent = await page.getTextContent();
    const viewport = page.getViewport({scale: 1});

    result += '══════════════════════════════════════════\n';
    result += '  STRONA ' + p + '/' + totalPages + '  (wymiary: ' + viewport.width.toFixed(0) + 'x' + viewport.height.toFixed(0) + ')\n';
    result += '══════════════════════════════════════════\n\n';

    // --- Raw items with coordinates ---
    result += '--- ELEMENTY TEKSTOWE (x, y, szerokość, tekst) ---\n';

    // Sort by Y (top to bottom), then X (left to right)
    const items = textContent.items.map(item => ({
      text: item.str,
      x: Math.round(item.transform[4]),
      y: Math.round(viewport.height - item.transform[5]),
      w: Math.round(item.width),
      h: Math.round(item.height),
      font: item.fontName || ''
    }));

    items.sort((a, b) => a.y - b.y || a.x - b.x);

    // Group into lines (items within 3px of same Y)
    const lines = [];
    let currentLine = null;

    for (const item of items) {
      if (!item.text.trim() && item.text !== ' ') continue;

      if (!currentLine || Math.abs(item.y - currentLine.y) > 3) {
        currentLine = { y: item.y, items: [] };
        lines.push(currentLine);
      }
      currentLine.items.push(item);
    }

    // Output each line with column positions
    for (const line of lines) {
      line.items.sort((a, b) => a.x - b.x);

      // Raw coordinates view
      const parts = line.items.map(it =>
        '[x=' + it.x + ',w=' + it.w + '] "' + it.text + '"'
      );
      result += 'Y=' + line.y + ': ' + parts.join('  ') + '\n';
    }

    result += '\n--- WIDOK TABELARYCZNY (rekonstrukcja linii) ---\n';

    // Reconstruct as visual lines
    for (const line of lines) {
      line.items.sort((a, b) => a.x - b.x);
      let lineText = '';
      let lastEnd = 0;
      for (const item of line.items) {
        // Insert spaces based on gap between items
        const gap = item.x - lastEnd;
        if (gap > 20) lineText += '  |  ';
        else if (gap > 5) lineText += ' ';
        lineText += item.text;
        lastEnd = item.x + item.w;
      }
      result += lineText + '\n';
    }

    result += '\n';
    status.textContent = 'Przetwarzanie... strona ' + p + '/' + totalPages;
  }

  output.textContent = result;
  copyBtn.style.display = '';
  status.textContent = 'Gotowe! ' + totalPages + ' stron. Skopiuj wynik i wklej do czatu.';
}

function copyResult() {
  navigator.clipboard.writeText(output.textContent).then(() => {
    copyBtn.textContent = 'Skopiowano!';
    setTimeout(() => copyBtn.textContent = 'Kopiuj wynik do schowka', 2000);
  });
}
</script>
</body>
</html>
